apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-sentinel-tunnel
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-sentinel
      app.kubernetes.io/component: tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-sentinel
        app.kubernetes.io/component: tunnel
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --loglevel
            - info
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fraud-sentinel-secrets
                  key: CLOUDFLARE_TUNNEL_TOKEN
          ports:
            - name: metrics
              containerPort: 2000
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 65532
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-sentinel-tunnel-metrics
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: tunnel
spec:
  selector:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: tunnel
  ports:
    - name: metrics
      port: 2000
      targetPort: metrics
