apiVersion: batch/v1
kind: Job
metadata:
  name: fraud-trainer
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: trainer
spec:
  suspend: true
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-sentinel
        app.kubernetes.io/component: trainer
    spec:
      serviceAccountName: fraud-sentinel
      restartPolicy: Never
      containers:
        - name: trainer
          image: ghcr.io/ixxet/fraud-sentinel-trainer:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - fraud_sentinel.cli.train
            - --download-if-missing
            - --csv
            - /data/creditcard.csv
            - --output-dir
            - /models
          envFrom:
            - configMapRef:
                name: fraud-sentinel-config
            - secretRef:
                name: fraud-sentinel-secrets
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          volumeMounts:
            - name: model-artifacts
              mountPath: /models
            - name: uploads
              mountPath: /data
          resources:
            requests:
              cpu: "1"
              memory: 3Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: fraud-model-artifacts
        - name: uploads
          persistentVolumeClaim:
            claimName: fraud-uploads
