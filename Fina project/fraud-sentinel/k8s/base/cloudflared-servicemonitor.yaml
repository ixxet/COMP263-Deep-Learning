apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fraud-sentinel-tunnel
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: tunnel
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-sentinel
      app.kubernetes.io/component: tunnel
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
