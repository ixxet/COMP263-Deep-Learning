apiVersion: batch/v1
kind: Job
metadata:
  name: fraud-rag-seed
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: rag-seed
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-sentinel
        app.kubernetes.io/component: rag-seed
    spec:
      serviceAccountName: fraud-sentinel
      restartPolicy: Never
      containers:
        - name: seed
          image: ghcr.io/ixxet/fraud-sentinel-api:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "fraud_sentinel.cli.seed_rag"]
          envFrom:
            - configMapRef:
                name: fraud-sentinel-config
            - secretRef:
                name: fraud-sentinel-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
