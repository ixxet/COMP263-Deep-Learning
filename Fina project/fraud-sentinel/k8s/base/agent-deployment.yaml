apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-agent
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-sentinel
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-sentinel
        app.kubernetes.io/component: agent
    spec:
      containers:
        - name: agent
          image: ghcr.io/ixxet/fraud-sentinel-api:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "fraud_sentinel.cli.agent_worker"]
          envFrom:
            - configMapRef:
                name: fraud-sentinel-config
            - secretRef:
                name: fraud-sentinel-secrets
          resources:
            requests:
              cpu: 150m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

