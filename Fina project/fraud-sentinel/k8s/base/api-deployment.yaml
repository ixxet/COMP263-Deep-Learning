apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-sentinel
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-sentinel
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/ixxet/fraud-sentinel-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: fraud-sentinel-config
            - secretRef:
                name: fraud-sentinel-secrets
          volumeMounts:
            - name: model-artifacts
              mountPath: /models
              readOnly: true
            - name: uploads
              mountPath: /uploads
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: fraud-model-artifacts
        - name: uploads
          persistentVolumeClaim:
            claimName: fraud-uploads

