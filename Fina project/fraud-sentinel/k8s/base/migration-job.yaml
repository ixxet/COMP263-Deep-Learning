apiVersion: batch/v1
kind: Job
metadata:
  name: fraud-migrate
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-sentinel
        app.kubernetes.io/component: migrate
    spec:
      serviceAccountName: fraud-sentinel
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/ixxet/fraud-sentinel-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - fraud_sentinel.cli.migrate
            - --migrations-dir
            - /app/backend/migrations
          envFrom:
            - configMapRef:
                name: fraud-sentinel-config
            - secretRef:
                name: fraud-sentinel-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
