apiVersion: batch/v1
kind: Job
metadata:
  name: fraud-migrate
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-sentinel
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/ixxet/fraud-sentinel-api:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "fraud_sentinel.cli.migrate"]
          envFrom:
            - configMapRef:
                name: fraud-sentinel-config
            - secretRef:
                name: fraud-sentinel-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

