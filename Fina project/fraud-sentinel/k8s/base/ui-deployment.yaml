apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-ui
  labels:
    app.kubernetes.io/name: fraud-sentinel
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-sentinel
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-sentinel
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: fraud-sentinel
      containers:
        - name: ui
          image: ghcr.io/ixxet/fraud-sentinel-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: fraud-sentinel-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
