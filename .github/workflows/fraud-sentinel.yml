name: Fraud Sentinel Build

on:
  push:
    branches: ["main", "codex/**"]
    paths:
      - ".github/workflows/fraud-sentinel.yml"
      - "Fina project/fraud-sentinel/**"
  pull_request:
    paths:
      - ".github/workflows/fraud-sentinel.yml"
      - "Fina project/fraud-sentinel/**"

permissions:
  contents: read
  packages: write

env:
  PROJECT_DIR: Fina project/fraud-sentinel
  API_IMAGE: ghcr.io/ixxet/fraud-sentinel-api
  TRAINER_IMAGE: ghcr.io/ixxet/fraud-sentinel-trainer
  UI_IMAGE: ghcr.io/ixxet/fraud-sentinel-ui

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: "${{ env.PROJECT_DIR }}/frontend/package-lock.json"
      - uses: imranismail/setup-kustomize@v2
      - name: Backend unit tests
        run: |
          python -m pip install --upgrade pip
          PYTHONPATH=backend python -m unittest discover backend/tests
          python -m compileall -q backend/fraud_sentinel
      - name: Frontend checks
        working-directory: ${{ env.PROJECT_DIR }}/frontend
        run: |
          npm ci
          npm run check
          npm run build
      - name: Kustomize validation
        run: kustomize build k8s/overlays/talos >/tmp/fraud-sentinel.yaml

  images:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/ixxet/fraud-sentinel-api
            dockerfile: backend/Dockerfile
          - name: trainer
            image: ghcr.io/ixxet/fraud-sentinel-trainer
            dockerfile: backend/Dockerfile.trainer
          - name: ui
            image: ghcr.io/ixxet/fraud-sentinel-ui
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ env.PROJECT_DIR }}
          file: ${{ env.PROJECT_DIR }}/${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Fraud Sentinel ${{ matrix.name }}
